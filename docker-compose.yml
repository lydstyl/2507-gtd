services:
  postgres:
    image: postgres:16-alpine
    container_name: gtd-docker-postgres
    environment:
      POSTGRES_DB: gtd_production
      POSTGRES_USER: gtd_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required — copy .env.example to .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - gtd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gtd_user -d gtd_production"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gtd-docker-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://gtd_user:${DB_PASSWORD}@postgres:5432/gtd_production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gtd-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: gtd-docker-frontend
    ports:
      - "3080:80"
    depends_on:
      - backend
    networks:
      - gtd-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  gtd-network:
    driver: bridge
